<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RitiFlix - Meu Perfil</title>
<style>html,body{background:#07090f;margin:0;height:100%}</style>
</head>
<body>
<script>
/*
  Este arquivo NÃO contém o app. Ele apenas busca o index.html principal
  (que fica na raiz do RitiFlix) e o carrega aqui, já abrindo direto na
  tela de Perfil (favoritos, histórico, configurações). Assim, qualquer
  atualização feita no index.html da raiz aparece automaticamente aqui
  também — sem precisar editar este arquivo.
*/
window.RITIFLIX_ENTRY = 'profile';
(async function () {
  try {
    const res = await fetch('../index.html', { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    let html = await res.text();
    // Faz os caminhos relativos (imagens, manifest etc.) apontarem para a pasta raiz.
    html = html.replace('<head>', '<head><base href="../">');
    // Título de aba específico desta página.
    html = html.replace(/<title>.*?<\/title>/i, '<title>RitiFlix - Meu Perfil</title>');
    document.open();
    document.write(html);
    document.close();
  } catch (e) {
    console.error('[RitiFlix] Falha ao carregar a página Perfil:', e);
    document.body.innerHTML =
      '<div style="color:#eef2ff;font-family:Arial,sans-serif;text-align:center;margin-top:20vh">' +
      '<p style="font-size:1.1rem">Não foi possível carregar o RitiFlix.</p>' +
      '<p style="color:#8899bb;font-size:.9rem">Verifique sua conexão e recarregue a página.</p>' +
      '</div>';
  }
})();
</script>
</body>
</html>
